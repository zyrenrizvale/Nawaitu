name: Release Nawaitu App

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: 'Apa yang baru? (Changelog)'
        required: true
        default: '- Perbaikan bug & Pembaruan UI'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Tarik Kodingan
        uses: actions/checkout@v3

      - name: Siapkan Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Beri Izin Eksekusi Gradle
        run: chmod +x gradlew

      - name: Hapus Settingan Java Windows (jika ada)
        run: sed -i '/org.gradle.java.home/d' gradle.properties || true

      - name: Menetapkan Versi Otomatis (Auto-Increment)
        run: |
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION_NAME=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Update versionCode & versionName
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ env.VERSION_CODE }}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ env.VERSION_NAME }}\"/" app/build.gradle.kts

      - name: Rakit APK Debug
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          NAMA_FILE="Nawaitu_v${{ env.VERSION_NAME }}_b${{ env.VERSION_CODE }}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$NAMA_FILE"
          echo "APK_NAME=$NAMA_FILE" >> $GITHUB_ENV

      - name: Kirim ke Telegram
        run: |
          PESAN="*UPDATE NAWAITU TERSEDIA!*%0A%0A*Versi:* ${{ env.VERSION_NAME }} (Build ${{ env.VERSION_CODE }})%0A*Apa yang baru:*%0A${{ github.event.inputs.changelog }}"

          for ID in 6071587883 7520038758; do
            curl -s -F document=@"${{ env.APK_NAME }}" \
                 -F caption="$PESAN" \
                 "https://api.telegram.org/bot8825507034:AAHKGjBB6um-i0BWhz1USKQcITKqF-dGhDs/sendDocument?chat_id=$ID"
          done

      - name: Buat GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.VERSION_CODE }}"
          name: "Nawaitu Update v${{ env.VERSION_NAME }}"
          body: "${{ github.event.inputs.changelog }}"
          files: "${{ env.APK_NAME }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
